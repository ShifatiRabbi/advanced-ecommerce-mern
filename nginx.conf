server {
    listen 80;
    server_name myshop.com www.myshop.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name myshop.com www.myshop.com;

    ssl_certificate     /etc/letsencrypt/live/myshop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myshop.com/privkey.pem;

    # Serve React client
    root /var/www/shopbd/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        gzip_static on;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /admin {
        alias /var/www/shopbd/admin/dist;
        try_files $uri $uri/ /admin/index.html;
    }

    # Proxy API to Node
    location /api {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploaded files
    location /uploads {
        alias /var/www/shopbd/server/uploads;
        expires 30d;
    }
}